# ---------------------------------------------------------------------------
# Compute environment
# ---------------------------------------------------------------------------
compute:
  platform: "HP OMEN (local)"
  cpu_cores: 8
  ram_gb: 16
  python_version: "3.13.1"
  os: "Windows 11"
  uses_gpu_for_inference: false          # ranking step is CPU-only
  has_network_during_ranking: false      # no API calls during ranking
  pre_computation_required: true         # embeddings precomputed offline (GPU)
  pre_computation_time_minutes: 17       # one-time embedding of 100k profiles on RTX 4060

# ---------------------------------------------------------------------------
# AI tools declaration (transparency only; honest declaration is not penalized)
# ---------------------------------------------------------------------------
ai_tools_used:
  - "Other"
ai_usage_summary: |
  An AI coding assistant was used for parts of implementation and code review.
  No candidate data was sent to any hosted LLM, and the ranking step makes no
  network calls — it scores candidates locally over precomputed embeddings.

methodology_summary: |
  Hybrid ranker over a 100k pool with no labels. Per candidate: dense semantic
  similarity (bge-small-en-v1.5) to the JD + five structured JD-fit features
  (experience band, product-vs-services, title relevance, location, education)
  minus red-flag penalties (consulting-only, LLM-wrapper-only, manager-no-code,
  vision/speech-only, title-chasing), times a behavioral availability modifier.
  Impossible "honeypot" profiles are detected and demoted. CPU-only ranking over
  precomputed float16 embeddings runs in well under the 5-minute budget. Reasoning
  is generated from facts present in each profile (no hallucination).

declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true
